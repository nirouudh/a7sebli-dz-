<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة المعدل الجامعي الذكية - نظام LMD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#161b2e;
  --ink-2:#262f52;
  --burgundy:#6e1f2d;
  --burgundy-light:#8c2f3f;
  --paper:#eee7d6;
  --paper-2:#fbf7ec;
  --gold:#a9842f;
  --gold-light:#d8b35f;
  --gold-foil:linear-gradient(135deg,#9c7a35,#e3c476 40%,#a9842f 60%,#f0d999);
  --success:#356b45;
  --danger:#8c2f23;
  --line:#cdc1a0;
  --line-soft:#ddd2b3;
  --muted:#7d7457;
}
*{box-sizing:border-box;}

/* =========================================================
   VIDEO BACKGROUND + GLASS LAYER
========================================================= */
html, body{ min-height:100%; }
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  color:var(--ink);
  padding:36px 16px 70px;
  direction:rtl;
  position:relative;
}

.video-bg{
  position:fixed; inset:0; z-index:-3;
  width:100%; height:100%;
  overflow:hidden;
  background:var(--ink);
}
.video-bg video{
  position:absolute; top:50%; left:50%;
  width:100%; height:100%;
  min-width:100%; min-height:100%;
  object-fit:cover;
  transform:translate(-50%,-50%);
  filter:saturate(1.08);
}

.video-bg::after{
  content:"";
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 20% -10%, rgba(110,31,45,0.12), transparent 45%),
    radial-gradient(ellipse at 100% 110%, rgba(22,27,46,0.22), transparent 50%),
    linear-gradient(180deg, rgba(13,16,28,0.32) 0%, rgba(13,16,28,0.4) 100%);
}

body::before{
  content:"";
  position:fixed; inset:0; z-index:-2;
  background-image:
    repeating-linear-gradient(to bottom, transparent 0 40px, rgba(255,255,255,0.02) 40px 41px);
  pointer-events:none;
}

/* =========================================================
   GLASS CONTAINER
========================================================= */
.container{
  max-width:1160px; margin:0 auto; position:relative; z-index:1;
  background:rgba(251,247,236,0.26);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  backdrop-filter:blur(24px) saturate(1.4);
  padding:0 0 40px;
  border-radius:14px;
  box-shadow:0 35px 80px -25px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.5) inset;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.55);
}
.container::before{
  content:""; position:absolute; inset:10px;
  border:1px solid rgba(169,132,47,0.35);
  pointer-events:none; z-index:5; border-radius:9px;
}

/* ---- Hero ---- */
.hero{
  background:linear-gradient(160deg, rgba(22,27,46,0.85) 0%, rgba(38,47,82,0.85) 55%, rgba(52,64,110,0.8) 100%);
  color:var(--paper-2);
  padding:46px 30px 36px;
  position:relative;
  text-align:center;
  overflow:hidden;
  border-bottom:3px solid var(--gold);
}
.hero::after{
  content:"";
  position:absolute; inset:0;
  background:
    radial-gradient(circle at 92% 8%, rgba(216,179,95,0.32), transparent 38%),
    radial-gradient(circle at 4% 95%, rgba(216,179,95,0.16), transparent 42%);
  animation:driftGlow 14s ease-in-out infinite alternate;
}
@keyframes driftGlow{
  from{ transform:translate3d(0,0,0) scale(1); }
  to{ transform:translate3d(-14px,10px,0) scale(1.06); }
}
.hero-crest{
  position:relative; z-index:1; width:54px; height:54px; margin:0 auto 14px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:var(--gold-foil); box-shadow:0 6px 18px -6px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,255,255,0.35);
  font-size:1.5rem;
  animation:crestSpin 1.1s ease-out;
}
@keyframes crestSpin{ from{ transform:rotate(-30deg) scale(0.6); opacity:0; } to{ transform:rotate(0) scale(1); opacity:1; } }
.hero-eyebrow{
  position:relative; z-index:1;
  display:inline-flex; align-items:center; gap:8px;
  font-size:0.76rem; letter-spacing:0.08em;
  color:var(--gold-light); font-weight:700;
  border:1px solid rgba(216,179,95,0.4);
  padding:5px 16px; border-radius:999px;
  background:rgba(216,179,95,0.08);
  margin-bottom:18px;
}
.hero-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--gold-light);animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}
h1{
  position:relative; z-index:1;
  font-family:'Cormorant Garamond', serif; font-weight:700;
  font-size:clamp(1.7rem, 3.4vw, 2.6rem);
  margin:0 0 10px;
  letter-spacing:0.01em;
}
.subtitle{
  position:relative; z-index:1;
  color:#cfd5e8; font-size:0.96rem; max-width:560px; margin:0 auto; line-height:1.7;
}
.hero-rule{
  position:relative; z-index:1; width:90px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-light),transparent);
  margin:18px auto 0;
}

/* ---- Guide ---- */
.guide-wrap{ padding:28px 30px 0; }
.guide-box{
  background:rgba(238,231,214,0.26);
  -webkit-backdrop-filter:blur(16px);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.55);
  border-right:4px solid var(--burgundy);
  border-radius:8px; padding:20px 24px; margin-bottom:6px;
  font-size:0.95rem; line-height:1.75;
  box-shadow:0 4px 14px -8px rgba(22,27,46,0.2);
}
.guide-title{
  font-family:'Cormorant Garamond',serif; font-weight:700; color:var(--ink);
  margin-bottom:12px; display:flex; align-items:center; gap:8px; font-size:1.2rem;
}
.guide-list{ margin:0; padding-right:20px; }
.guide-list li{ margin-bottom:8px; }
.guide-list b{ color:var(--burgundy); font-weight:700; }

.guide-image-container{
  text-align: center;
  margin-top: 20px;
  padding: 10px 0;
  perspective: 1000px;
}
.guide-image{
  max-width: 100%;
  width: 350px;
  height: auto;
  border-radius: 6px;
  border: 2px solid var(--line);
  box-shadow: 0 4px 12px rgba(22,27,46,0.12);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: zoom-in;
}
.guide-image:hover{
  transform: scale(1.12);
  box-shadow: 0 12px 28px rgba(22,27,46,0.25);
}

/* ---- Buttons ---- */
.btn{
  padding:11px 20px; border:none; border-radius:5px; cursor:pointer;
  font-weight:700; font-family:'Cairo',sans-serif; font-size:0.9rem;
  transition:transform 0.15s ease, box-shadow 0.2s ease, background 0.2s, letter-spacing 0.2s;
  margin:5px; display:inline-flex; align-items:center; gap:7px;
  letter-spacing:0.01em;
}
.btn:hover{ transform:translateY(-2px); letter-spacing:0.02em; }
.btn:active{ transform:translateY(0); }
.btn-add{ background:var(--ink-2); color:#fff; box-shadow:0 6px 16px -6px rgba(38,47,82,0.6); }
.btn-add:hover{ background:var(--ink); }
.btn-calc{
  background:linear-gradient(135deg,var(--burgundy), #4a1520); color:var(--gold-light);
  width:100%; font-size:1.1rem; padding:16px; margin-top:26px; border-radius:6px;
  box-shadow:0 14px 28px -10px rgba(110,31,45,0.55);
  letter-spacing:0.02em; font-family:'Cairo',sans-serif; font-weight:800;
  border:1px solid rgba(216,179,95,0.4);
  position:relative; overflow:hidden;
}
.btn-calc::before{
  content:""; position:absolute; top:0; right:-60%; width:40%; height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.18), transparent);
  transform:skewX(-20deg);
  transition:right 0.6s ease;
}
.btn-calc:hover::before{ right:130%; }
.btn-calc:hover{ box-shadow:0 18px 32px -10px rgba(110,31,45,0.7); }
.btn-danger{ background:transparent; color:var(--danger); border:1px solid rgba(140,47,35,0.35); padding:6px 13px; font-size:0.8rem; border-radius:4px; }
.btn-danger:hover{ background:rgba(140,47,35,0.07); }

.top-actions{ text-align:left; margin:24px 30px 0; }

/* ---- Layout ---- */
.main-layout{ display:flex; gap:24px; flex-wrap:wrap; margin:20px 30px 0; }
.content-area{ flex:3; min-width:300px; }
.advisor-area{
  flex:1; min-width:260px;
  background:rgba(255,248,236,0.28);
  -webkit-backdrop-filter:blur(18px);
  backdrop-filter:blur(18px);
  border:1px solid var(--gold-light); border-radius:10px; padding:20px;
  display:none; height:fit-content; position:sticky; top:20px;
  box-shadow:0 12px 26px -12px rgba(169,132,47,0.45);
  animation:popIn 0.45s ease;
}
.advisor-area::before{
  content:""; position:absolute; top:-9px; right:18px;
  color:var(--gold); background:rgba(255,248,236,0.9); font-size:0.8rem; padding:0 6px;
}
@keyframes popIn{ from{opacity:0; transform:translateY(-8px) scale(0.97);} to{opacity:1; transform:translateY(0) scale(1);} }

.advisor-title{
  font-family:'Cormorant Garamond',serif; font-weight:700; color:var(--burgundy); font-size:1.15rem;
  margin-bottom:12px; border-bottom:1px dashed var(--gold);
  padding-bottom:9px; display:flex; align-items:center; gap:8px;
}
.advisor-msg{ font-size:0.95rem; line-height:1.75; color:var(--ink-2); }
.advisor-alert{ color:var(--danger); font-weight:700; }

/* ---- Group card ---- */
.group-box{
  border:1px solid rgba(255,255,255,0.55); border-radius:10px; padding:22px;
  margin-bottom:24px; background:rgba(251,247,236,0.24);
  -webkit-backdrop-filter:blur(18px);
  backdrop-filter:blur(18px);
  box-shadow:0 8px 20px -14px rgba(22,27,46,0.3);
  transition:box-shadow 0.25s, background 0.25s;
  animation:fadeUp 0.35s ease;
  position:relative;
}
.group-box::before{
  content:""; position:absolute; top:0; right:0; width:3px; height:100%;
  background:linear-gradient(to bottom, var(--gold), transparent 85%);
  border-radius:0 6px 6px 0;
}
.group-box:hover{ box-shadow:0 14px 28px -16px rgba(22,27,46,0.4); background:rgba(251,247,236,0.4); }
@keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
.group-header{
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:2px solid var(--line-soft); padding-bottom:11px; margin-bottom:16px; gap:10px;
}
.group-title-input{
  font-family:'Cormorant Garamond',serif; font-size:1.25rem; font-weight:700;
  border:none; background:transparent; color:var(--ink);
  border-bottom:1px dashed var(--gold); width:60%; padding:2px 0;
}
.group-title-input:focus{ outline:none; border-bottom:1px solid var(--gold); }

table{ width:100%; border-collapse:collapse; margin-top:14px; margin-bottom:16px; }
th,td{ border:1px solid var(--line-soft); padding:11px 8px; text-align:center; font-size:0.9rem; }
th{ background:rgba(230,220,192,0.92); color:var(--ink); font-weight:700; font-size:0.84rem; letter-spacing:0.01em; }
tbody tr{ transition:background 0.2s; }
tbody tr:nth-child(odd){ background:rgba(248,243,230,0.65); }
tbody tr:hover{ background:rgba(240,230,203,0.85); }

input[type="text"], input[type="number"]{
  width:90%; padding:8px; border:1px solid var(--line); border-radius:4px;
  text-align:center; font-size:0.9rem; font-family:'Cairo',sans-serif;
  background:rgba(255,255,255,0.85); transition:border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
input[type="text"]:focus, input[type="number"]:focus{
  outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(169,132,47,0.15);
  background:#fff;
}

.group-summary{
  font-size:0.87rem; color:var(--muted); text-align:left; margin-top:8px; font-weight:700;
  font-family:'Cairo',sans-serif;
}

/* ---- Result: wax-seal medallion ---- */
.result-section{ margin:34px 30px 0; display:flex; flex-direction:column; align-items:center; gap:10px; }
.seal-wrap{ position:relative; width:170px; height:170px; display:none; }
.seal-ring{
  position:absolute; inset:0; border-radius:50%;
  background:conic-gradient(from -90deg, var(--ring-color, var(--success)) 0deg, var(--ring-color, var(--success)) calc(var(--p,0) * 1deg), var(--line-soft) calc(var(--p,0) * 1deg), var(--line-soft) 360deg);
  transition:--p 1.2s cubic-bezier(.4,1,.4,1), --ring-color 0.4s;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 14px 30px -14px rgba(22,27,46,0.5);
}
@property --p{ syntax:'<number>'; initial-value:0; inherits:false; }
.seal-inner{
  width:138px; height:138px; border-radius:50%;
  background:rgba(251,247,236,0.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  box-shadow:inset 0 0 0 1px var(--gold-light), inset 0 4px 14px rgba(22,27,46,0.08);
}
.seal-value{
  font-family:'Cormorant Garamond',serif; font-size:2.5rem; font-weight:700; color:var(--ink);
  line-height:1;
}
.seal-label{ font-size:0.74rem; color:var(--muted); font-weight:700; letter-spacing:0.04em; margin-top:4px; }
.seal-status{
  position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
  background:var(--burgundy); color:#fff; font-size:0.72rem; font-weight:700;
  padding:4px 14px; border-radius:999px; white-space:nowrap;
  box-shadow:0 6px 14px -4px rgba(110,31,45,0.5);
  border:1px solid rgba(216,179,95,0.5);
}
.seal-status.pass{ background:var(--success); }
.result-caption{ font-size:0.96rem; color:var(--ink); text-align:center; max-width:420px; margin-top:14px; line-height:1.7; font-weight:600; }
.result-empty{ font-size:1.02rem; color:var(--ink); font-weight:700; padding:24px; text-align:center; font-family:'Cairo',sans-serif; }

/* ---- Result popup (modal) showing the same medallion ---- */
.result-popup-overlay{
  position:fixed; inset:0; z-index:999;
  background:rgba(13,16,28,0.55);
  -webkit-backdrop-filter:blur(4px);
  backdrop-filter:blur(4px);
  display:none;
  align-items:center; justify-content:center;
  padding:20px;
  animation:popupFadeIn 0.3s ease;
}
@keyframes popupFadeIn{ from{ opacity:0; } to{ opacity:1; } }

.result-popup-card{
  position:relative;
  background:linear-gradient(165deg, var(--paper-2), var(--paper));
  border-radius:16px;
  padding:38px 30px 30px;
  max-width:340px; width:100%;
  text-align:center;
  box-shadow:0 40px 90px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(216,179,95,0.4);
  border:1px solid var(--gold-light);
  animation:popupScaleIn 0.4s cubic-bezier(.34,
